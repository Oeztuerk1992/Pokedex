<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./logo/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./style/colors.css">
</head>
<body onload="fetchPokemonData()">

<header>
    <nav class="navbar bg-danger">
            <div class="container container-fluid">
                <a class="navbar-brand logo" href="./index.html" >
                    <img class="logo" src="./logo/logo.png" alt="logo">
                    <span class="logo-text">Pokédex</span>
                </a>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                    <button class="btn border-white text-white" type="submit">Search</button>
                </form>
            </div>
    </nav>
</header>

<main class="main-container  container">
    <div id="pokemon-container" class="contain-box"></div>
    <div class="text-center">
        <button onclick="loadedMorePokemons()" class="btn btn-success" id="load-more">Load More</button>
    </div>
</main>

<div class="modal">
    
</div>

<footer>
    <div class="bg-danger text-white py-3">
        <p class="text-center">© 2026 Pokédex. All rights reserved.</p>
    </div>
</footer>

    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
    
</body>
</html>
